name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG_VERSION  tag=$TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' 与 package.json version '$PKG_VERSION' 不一致"
            exit 1
          fi

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx --yes @vscode/vsce package -o "unipack-vscode-${{ github.ref_name }}.vsix"

      - name: Extract changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node -e '
            const fs=require("fs");
            const ver=(process.env.TAG||"").replace(/^v/,"");
            const md=fs.existsSync("CHANGELOG.md")?fs.readFileSync("CHANGELOG.md","utf8"):"";
            const lines=md.split(/\r?\n/);
            let out=[],cap=false;
            for(const l of lines){
              if(/^##\s+\[/.test(l)){ if(cap) break; if(l.includes("["+ver+"]")){cap=true;continue;} }
              else if(cap){ out.push(l); }
            }
            let body=out.join("\n").trim();
            if(!body) body="Release "+ver;
            fs.writeFileSync("RELEASE_NOTES.md", body+"\n");
          '
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: "unipack-vscode-*.vsix"

      - name: Push tag to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git push --force "https://vvvon:${GITEE_TOKEN}@gitee.com/vvvon/unipack-vscode.git" "refs/tags/${GITHUB_REF_NAME}"

      - name: Create Gitee Release with vsix
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          OWNER=vvvon
          REPO=unipack-vscode
          TAG="${GITHUB_REF_NAME}"
          VSIX="unipack-vscode-${TAG}.vsix"
          # 删除同 tag 的旧 Release（保证可重复发布同一版本）
          LIST=$(curl -s "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases?access_token=${GITEE_TOKEN}&per_page=100")
          OLD_ID=$(printf '%s' "$LIST" | TAG="$TAG" node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{const a=JSON.parse(s);const r=a.find(x=>x.tag_name===process.env.TAG);process.stdout.write(r?String(r.id):'')}catch(e){process.stdout.write('')}})")
          if [ -n "$OLD_ID" ]; then
            echo "删除旧 Gitee Release $OLD_ID"
            curl -s -X DELETE "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${OLD_ID}?access_token=${GITEE_TOKEN}" > /dev/null
          fi
          RESP=$(curl -s -X POST "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases" \
            -F "access_token=${GITEE_TOKEN}" \
            -F "tag_name=${TAG}" \
            -F "name=${TAG}" \
            -F "body=<RELEASE_NOTES.md" \
            -F "target_commitish=main")
          echo "create release resp: $RESP"
          RELEASE_ID=$(printf '%s' "$RESP" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{process.stdout.write(String(JSON.parse(s).id||''))}catch(e){process.stdout.write('')}})")
          if [ -z "$RELEASE_ID" ]; then
            echo "::error::创建 Gitee Release 失败: $RESP"
            exit 1
          fi
          echo "Gitee release id: $RELEASE_ID"
          echo "Uploading $VSIX ..."
          curl -s -X POST "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files" \
            -F "access_token=${GITEE_TOKEN}" \
            -F "file=@${VSIX}" | head -c 800
          echo ""
